/* Auto-adaptive camera: adjust camD so the scene fills the viewport proportionally */
function fitCameraToViewport(){
  var cw=W.clientWidth,ch=W.clientHeight;
  if(cw<1||ch<1) return;
  /* Reference: at 1440px wide, camD should be 28 */
  /* Scale linearly: smaller viewport -> closer camera (scene appears bigger) */
  var refWidth=1440;
  var scaleFactor=cw/refWidth;
  /* Clamp: don't get too close or too far */
  var targetD=28/Math.max(0.4,Math.min(1.8,scaleFactor));
  targetD=Math.max(12,Math.min(50,targetD));
  /* Smoothly interpolate current camD toward target, preserving user's manual zoom offset */
  var userOffset=camD-camDBase;
  camDBase=targetD;
  camD=targetD+userOffset;
  camD=Math.max(12,Math.min(50,camD));
}

/* Use ResizeObserver to catch BOTH window resize AND browser zoom */

  for(var i=0;i<entries.length;i++){

    if(cr.width>0&&cr.height>0){
      w=cr.width;h=cr.height;
      cam.aspect=w/h;cam.updateProjectionMatrix();
      ren.setSize(w,h);
      fitCameraToViewport();
    }
  }
});

/* Lighting */
function lerp(a,b,t){return a+(b-a)*t;}
function lC(c1,c2,t){return(Math.round(lerp((c1>>16)&0xff,(c2>>16)&0xff,t))<<16)|(Math.round(lerp((c1>>8)&0xff,(c2>>8)&0xff,t))<<8)|Math.round(lerp(c1&0xff,c2&0xff,t));}
function updateLight(t){
  var hr=(t%1)*24,sky,sI,aI,fog;
  if(hr>=6&&hr<8){var f=(hr-6)/2;sky=lC(0x0a0a2e,0x87ceeb,f);sI=lerp(0.1,1,f);aI=lerp(0.15,0.4,f);fog=lC(0x1a1a3e,0xc8d8e8,f);}
  else if(hr>=8&&hr<17){sky=0x87ceeb;sI=1;aI=0.4;fog=0xc8d8e8;}
  else if(hr>=17&&hr<19.5){var f=(hr-17)/2.5;sky=lC(0x87ceeb,0xff7744,f);sI=lerp(1,0.4,f);aI=lerp(0.4,0.2,f);fog=lC(0xc8d8e8,0x553322,f);}
  else if(hr>=19.5&&hr<21){var f=(hr-19.5)/1.5;sky=lC(0xff7744,0x0a0a2e,f);sI=lerp(0.4,0.05,f);aI=lerp(0.2,0.1,f);fog=lC(0x553322,0x0a0a1e,f);}
  else{sky=0x0a0a2e;sI=0.05;aI=0.1;fog=0x0a0a1e;}
  scene.background=new THREE.Color(sky);scene.fog=new THREE.Fog(fog,30,65);
  sunLight.intensity=sI;amb.intensity=aI;
  var sa=(hr/24)*Math.PI*2-Math.PI/2;sunLight.position.set(Math.cos(sa)*18,Math.sin(sa)*18+5,5);
  sunLight.color.set(hr>=17&&hr<20?0xffaa66:0xffeedd);
  var night=hr>=19.5||hr<6;
  for(var li=0;li<lamps.length;li++){lamps[li].userData.light.intensity=night?1.2:0;lamps[li].userData.bulb.material.opacity=night?1:0.2;}
  starField.material.opacity=night?0.8:0;
  var hh=Math.floor(hr),mm=Math.floor((hr-hh)*60);
  CK.textContent=(hh<10?'0':'')+hh+':'+(mm<10?'0':'')+mm;
}

/* Animate */
function animate(){
  requestAnimationFrame(animate);
  time+=0.0003;
  var T=performance.now()*0.001;
  updateLight(time);

  /* NPC1: walker on horizontal road (z=1.2 offset, x back-and-forth) */
  n1a+=0.006;
  var walkX=Math.sin(n1a)*9;
  var walkDir=Math.cos(n1a)>0?1:-1;
  npc1.position.set(walkX,0,1.2);
  npc1.rotation.y=walkDir>0?Math.PI/2:-Math.PI/2;
  npc1.position.y=Math.abs(Math.sin(n1a*6))*0.06;
  npc1.userData.legL.rotation.x=Math.sin(T*4)*0.4;
  npc1.userData.legR.rotation.x=-Math.sin(T*4)*0.4;

  /* NPC2: cyclist on horizontal road (z=0, x back-and-forth) */
  n2a+=0.012;
  var bikeX=Math.sin(n2a)*10;
  var bikeDir=Math.cos(n2a)>0?1:-1;
  npc2grp.position.set(bikeX,0,0);
  npc2grp.rotation.y=bikeDir>0?Math.PI/2:-Math.PI/2;
  wheelF.rotation.x=T*6;wheelB.rotation.x=T*6;

  /* NPC3: swing front-back (rotation.x) */
  swingPendulum.rotation.x=Math.sin(T*1.8)*0.45;

  /* NPC4: dog walker on vertical road (x=0, z back-and-forth) */
  n4a+=0.005;
  var dogZ=Math.sin(n4a)*10;
  var dogDir=Math.cos(n4a)>0?1:-1;
  npc4.position.set(0,0,dogZ);
  npc4.rotation.y=dogDir>0?0:Math.PI;
  npc4.position.y=Math.abs(Math.sin(n4a*5))*0.05;
  npc4.userData.legL.rotation.x=Math.sin(T*3.5)*0.35;
  npc4.userData.legR.rotation.x=-Math.sin(T*3.5)*0.35;
  dogGrp.position.set(0,0,dogZ-dogDir*1.2);
  dogGrp.rotation.y=dogDir>0?0:Math.PI;
  dogGrp.userData.tail.rotation.x=-Math.PI/4+Math.sin(T*8)*0.3;
  for(var dli=0;dli<4;dli++)dogGrp.userData.legs[dli].rotation.x=Math.sin(T*5+dli*Math.PI/2)*0.3;

  /* NPC5: reader (slight idle bob) */
  npc5.position.y=0.48+Math.sin(T*0.8)*0.015;
  bookMesh.position.y=1.0+Math.sin(T*0.8)*0.015;
  bookMesh.rotation.y=Math.PI+Math.sin(T*0.5)*0.05;

  /* Clouds */
  for(var cci=0;cci<clouds.length;cci++){clouds[cci].position.x+=0.006;if(clouds[cci].position.x>28)clouds[cci].position.x=-28;}

  /* Camera */
  cam.position.x=Math.sin(camT)*Math.cos(camP)*camD;
  cam.position.y=Math.sin(camP)*camD;
  cam.position.z=Math.cos(camT)*Math.cos(camP)*camD;
  cam.lookAt(0,1,0);
  ren.render(scene,cam);
}
animate();

window.addEventListener('resize',function(){w=W.clientWidth;h=W.clientHeight;cam.aspect=w/h;cam.updateProjectionMatrix();ren.setSize(w,h);});
}();
</script>
