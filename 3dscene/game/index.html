<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Z7A的游戏世界</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
        <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Nunito:wght@700&display=swap" rel="stylesheet" />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --accent: #52adc8;
                --card-bg: #f8f9fa;
                --card-hover: #eef0f2;
                --text: #494e52;
                --muted: #7a8288;
            }

            body {
                min-height: 100vh;
                background: #fff;
                color: var(--text);
                font-family: "Nunito", sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 80px 2rem 4rem;
            }

            /* ── Nav bar ── */
            .nav {
                position: fixed; top: 0; left: 0; right: 0; z-index: 100;
                padding: 12px 24px; display: flex; align-items: center; gap: 24px;
                background: linear-gradient(180deg, rgba(255,255,255,0.96) 0%, transparent 100%);
                pointer-events: none;
            }
            .nav a { color: var(--muted); text-decoration: none; font-size: 14px; pointer-events: auto; transition: color .2s; }
            .nav a:hover { color: var(--text); }
            .nav a.brand { color: var(--text); font-weight: 600; font-size: 16px; margin-right: auto; }

            h1 {
                font-family: "Cinzel", serif;
                font-size: clamp(1.4rem, 3.5vw, 2.2rem);
                font-weight: 900;
                letter-spacing: 0.06em;
                text-align: center;
                color: var(--text);
                margin-bottom: 0.3rem;
            }
            .desc {
                font-size: 0.88rem;
                color: #7a8288;
                text-align: center;
                max-width: 520px;
                line-height: 1.6;
                margin-bottom: 0.8rem;
            }
            .back-hub {
                display: inline-flex; align-items: center; gap: 6px;
                padding: 6px 16px; margin-bottom: 1.2rem;
                color: var(--accent); font-weight: 600; font-size: 0.85rem;
                text-decoration: none; border: 1px solid var(--accent);
                border-radius: 999px; transition: all .2s;
            }
            .back-hub:hover {
                background: var(--accent); color: #fff;
            }
            .subtitle {
                font-size: 0.78rem;
                color: var(--muted);
                letter-spacing: 0.14em;
                text-transform: uppercase;
                margin-bottom: 2.5rem;
            }

            .sections {
                width: 100%;
                max-width: 1200px;
                display: flex;
                flex-direction: column;
                gap: 2.2rem;
            }

            .section {
                display: flex;
                flex-direction: column;
                gap: 1rem;
            }

            .section-head {
                display: flex;
                align-items: end;
                justify-content: space-between;
                gap: 1rem;
                padding-bottom: 0.7rem;
                border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            }

            .section-title {
                font-size: 1.1rem;
                font-weight: 800;
                letter-spacing: 0.04em;
            }

            .section-desc {
                font-size: 0.9rem;
                color: #7a8288;
                text-align: right;
            }

            /* ── grid ── */
            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 1.2rem;
                width: 100%;
                max-width: 1200px;
            }

            /* ── card ── */
            .card {
                background: var(--card-bg);
                border-radius: 14px;
                overflow: hidden;
                text-decoration: none;
                color: var(--text);
                display: flex;
                flex-direction: column;
                aspect-ratio: 4/3;
                border: 1px solid rgba(0, 0, 0, 0.06);
                transition:
                    transform 0.18s ease,
                    box-shadow 0.18s ease,
                    background 0.18s ease;
                opacity: 0;
                animation: rise 0.4s ease forwards;
            }
            .card:hover {
                transform: translateY(-4px) scale(1.01);
                background: var(--card-hover);
                box-shadow:
                    0 12px 36px rgba(0, 0, 0, 0.12),
                    0 0 0 2px var(--accent);
            }
            .card:active {
                transform: translateY(-1px) scale(1.005);
            }

            .card-thumb {
                flex: 1;
                min-height: 0;
                overflow: hidden;
            }

            .card-thumb img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }
            .card-info {
                padding: 0.9rem 1.2rem;
                display: flex;
                align-items: center;
                justify-content: space-between;
                border-top: 1px solid rgba(0, 0, 0, 0.06);
            }
            .card-name {
                font-size: 1rem;
                font-weight: 700;
            }
            .play-btn {
                width: 2rem;
                height: 2rem;
                border-radius: 50%;
                background: var(--accent);
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
                box-shadow: 0 2px 8px rgba(82, 173, 200, 0.35);
                transition:
                    transform 0.15s,
                    background 0.15s;
            }
            .card:hover .play-btn {
                transform: scale(1.12);
                background: #2f7f93;
            }
            .play-btn svg {
                width: 10px;
                height: 10px;
                fill: #fff;
                margin-left: 2px;
            }

            /* WIP */
            .card.wip {
                opacity: 0.25 !important;
                pointer-events: none;
                border-style: dashed;
            }
            .card.wip .play-btn {
                background: var(--muted);
                box-shadow: none;
            }

            /* stagger */
            @keyframes rise {
                from {
                    opacity: 0;
                    transform: translateY(14px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .card:nth-child(1) {
                animation-delay: 0.05s;
            }
            .card:nth-child(2) {
                animation-delay: 0.12s;
            }
            .card:nth-child(3) {
                animation-delay: 0.19s;
            }
            .card:nth-child(4) {
                animation-delay: 0.26s;
            }
            .card:nth-child(5) {
                animation-delay: 0.33s;
            }
            .card:nth-child(6) {
                animation-delay: 0.4s;
            }

            @media (max-width: 720px) {
                .section-head {
                    align-items: flex-start;
                    flex-direction: column;
                }

                .section-desc {
                    text-align: left;
                }
            }
        </style>
    </head>
    <body>
