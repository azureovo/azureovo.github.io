<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D场景展示 - Z7A的个人空间</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <style>
        :root { --bg: #0a0a0f; --text: #e0e0e0; --accent: #64b5f6; --panel-bg: rgba(10,10,20,0.85); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; height:100vh; width:100vw; }
        .nav { position:fixed; top:0; left:0; right:0; z-index:100; padding:12px 24px; display:flex; align-items:center; gap:24px; background:linear-gradient(180deg,rgba(0,0,0,0.7) 0%,transparent 100%); }
        .nav a { color:#aaa; text-decoration:none; font-size:14px; transition:color 0.2s; }
        .nav a:hover { color:#fff; }
        .nav a.brand { color:#fff; font-weight:600; font-size:16px; margin-right:auto; }
        .nav a.active { color:var(--accent); }
        .hud { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:100; pointer-events:none; display:flex; flex-direction:column; align-items:center; gap:8px; }
        .controls-hint { background:var(--panel-bg); border-radius:8px; padding:8px 16px; font-size:12px; color:#888; backdrop-filter:blur(8px); }
        .controls-hint kbd { background:#333; color:#ccc; padding:2px 6px; border-radius:3px; font-family:monospace; font-size:11px; margin:0 2px; }
        .info-panel { position:fixed; top:80px; right:16px; z-index:100; background:var(--panel-bg); border-radius:8px; padding:12px 16px; font-size:12px; backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.1); pointer-events:none; }
        .info-panel .label { color:#666; } .info-panel .value { color:#ccc; margin-left:4px; }
        .fps { position:fixed; bottom:16px; right:16px; z-index:100; font-size:11px; font-family:monospace; color:#666; }
    </style>
</head>
<body>

<nav class="nav">
    <a href="/" class="brand">Z7A的个人空间</a>
    <a href="/">Home</a>
    <a href="/town/">小镇</a>
    <a href="/3dscene/" class="active">3D场景</a>
    <a href="/cv/">CV</a>
</nav>

<div class="hud" id="hud">
    <div class="controls-hint">
        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 移动 &nbsp;
        <kbd>鼠标拖拽</kbd> 旋转 &nbsp;
        <kbd>滚轮</kbd> 缩放 &nbsp;
        <kbd>空格</kbd> 切换模式
    </div>
</div>

<div class="info-panel">
    <div><span class="label">场景:</span><span class="value">Outdoor (3DGS)</span></div>
    <div><span class="label">引擎:</span><span class="value">GaussianSplats3D v0.4.7</span></div>
</div>

<div class="fps" id="fpsCounter">FPS: --</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import * as GaussianSplats3D from 'https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js';

// ============================================================
// DOM
// ============================================================
const fpsEl = document.getElementById('fpsCounter');
const hud = document.getElementById('hud');

// ============================================================
// Scene, Camera, Renderer
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 8);

const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.prepend(renderer.domElement);

// ============================================================
// Character
// ============================================================
const charGroup = new THREE.Group();
const bodyGeo = new THREE.CapsuleGeometry(0.12, 0.4, 4, 8);
const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4488ff, roughness: 0.4 });
const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
bodyMesh.position.y = 0.3;
charGroup.add(bodyMesh);
const headGeo = new THREE.SphereGeometry(0.1, 16, 16);
const headMesh = new THREE.Mesh(headGeo, new THREE.MeshStandardMaterial({ color: 0xffcc99 }));
headMesh.position.y = 0.7;
charGroup.add(headMesh);
charGroup.position.set(0, -1, 3);
scene.add(charGroup);

// Light
scene.add(new THREE.AmbientLight(0x404060, 2));
const dl = new THREE.DirectionalLight(0xffffff, 1);
dl.position.set(5, 10, 5);
scene.add(dl);

// ============================================================
// State
// ============================================================
let mode3rdPerson = true;
const keys = {};
let yaw = 0, pitch = 0.2;
const speed = 3.0;
const sensitivity = 0.002;

// ============================================================
// Mouse
// ============================================================
let dragging = false, pmx = 0, pmy = 0;
renderer.domElement.addEventListener('pointerdown', e => {
    if (e.button === 0 || e.button === 2) { dragging = true; pmx = e.clientX; pmy = e.clientY; }
});
window.addEventListener('pointerup', () => { dragging = false; });
window.addEventListener('pointermove', e => {
    if (!dragging) return;
    yaw -= (e.clientX - pmx) * sensitivity;
    pitch -= (e.clientY - pmy) * sensitivity;
    pitch = Math.max(-1.5, Math.min(1.5, pitch));
    pmx = e.clientX; pmy = e.clientY;
});
window.addEventListener('wheel', e => {
    if (mode3rdPerson) {
        const fwd = new THREE.Vector3();
        camera.getWorldDirection(fwd);
        camera.position.addScaledVector(fwd, e.deltaY * 0.01);
    }
});

// ============================================================
// Keyboard
// ============================================================
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space') { e.preventDefault(); mode3rdPerson = !mode3rdPerson; hud.style.display = mode3rdPerson ? 'flex' : 'none'; }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ============================================================
// Camera
// ============================================================
function updateCamera() {
    if (!mode3rdPerson) return;
    const cp = charGroup.position;
    const dist = 6;
    const cx = cp.x + Math.sin(yaw) * Math.cos(pitch) * dist;
    const cy = cp.y + 0.8 + Math.sin(pitch) * dist;
    const cz = cp.z + Math.cos(yaw) * Math.cos(pitch) * dist;
    camera.position.lerp(new THREE.Vector3(cx, cy, cz), 0.1);
    camera.lookAt(cp.x, cp.y + 0.6, cp.z);
}

// ============================================================
// Resize
// ============================================================
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// Load splat with GaussianSplats3D
// ============================================================
const viewer = new GaussianSplats3D.Viewer({
    'camera': camera,
    'renderer': renderer,
    'scene': scene,
    'gpuAcceleratedSort': true,
    'sharedMemoryForWorkers': false,
    'controls': { 'disable': true },
    'showInfo': false,
    'cameraUp': [0, -1, 0],
    'initialCameraPosition': [0, 2, 8],
    'initialCameraLookAt': [0, 0, 0],
});

await viewer.addSplatScene('Outdoor.splat', {
    'splatAlphaRemovalThreshold': 5,
    'showLoadingUI': true,
});

viewer.start();
console.log('✅ GaussianSplats3D Viewer started');

// ============================================================
// Animation
// ============================================================
const clock = new THREE.Clock();
let frameCount = 0, fpsTime = 0;

function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.1);

    // FPS
    frameCount++;
    fpsTime += dt;
    if (fpsTime >= 1.0) {
        fpsEl.textContent = `FPS: ${Math.round(frameCount / fpsTime)}`;
        frameCount = 0; fpsTime = 0;
    }

    // Movement
    const fwd = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
    const rgt = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));

    if (mode3rdPerson) {
        let mx = 0, mz = 0;
        if (keys['KeyW'] || keys['ArrowUp']) { mx += fwd.x; mz += fwd.z; }
        if (keys['KeyS'] || keys['ArrowDown']) { mx -= fwd.x; mz -= fwd.z; }
        if (keys['KeyA'] || keys['ArrowLeft']) { mx -= rgt.x; mz -= rgt.z; }
        if (keys['KeyD'] || keys['ArrowRight']) { mx += rgt.x; mz += rgt.z; }
        if (mx || mz) {
            const l = Math.sqrt(mx * mx + mz * mz);
            charGroup.position.x += (mx / l) * speed * dt;
            charGroup.position.z += (mz / l) * speed * dt;
            charGroup.rotation.y = Math.atan2(mx / l, mz / l);
        }
        updateCamera();
    } else {
        let mx = 0, mz = 0, my = 0;
        if (keys['KeyW']) { mx += fwd.x; mz += fwd.z; }
        if (keys['KeyS']) { mx -= fwd.x; mz -= fwd.z; }
        if (keys['KeyA']) { mx -= rgt.x; mz -= rgt.z; }
        if (keys['KeyD']) { mx += rgt.x; mz += rgt.z; }
        if (keys['KeyQ']) my -= 1;
        if (keys['KeyE']) my += 1;
        camera.position.x += mx * 5 * dt;
        camera.position.y += my * 5 * dt;
        camera.position.z += mz * 5 * dt;
        const dir = new THREE.Vector3(-Math.sin(yaw) * Math.cos(pitch), Math.sin(pitch), -Math.cos(yaw) * Math.cos(pitch));
        camera.lookAt(camera.position.clone().add(dir));
    }

    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
