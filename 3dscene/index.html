<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D场景展示 - Z7A的个人空间</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    
    <!-- TriSplat demo styles (remote, keeps demo looking correct) -->
    <link rel="stylesheet" href="https://lhmd.top/trisplat/styles.css?v=29">
    
    <style>
        /* Override TriSplat page-level styles for our clean wrapper */
        :root {
            --bg: #0a0b0a;
            --text: #f3efe4;
            --muted: #b2b0a6;
            --accent: #62dfca;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0b0a;
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            min-width: 0;
        }

        /* ---- Site Navigation ---- */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            background: linear-gradient(180deg, rgba(10,11,10,0.92) 0%, transparent 100%);
            pointer-events: none;
        }
        .nav a {
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
            pointer-events: auto;
        }
        .nav a:hover { color: #fff; }
        .nav a.brand {
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            margin-right: auto;
        }
        .nav a.active { color: #62dfca; }

        /* ---- Attribution ---- */
        .attribution {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            pointer-events: none;
        }
        .attribution a {
            color: rgba(255,255,255,0.5);
            pointer-events: auto;
            text-decoration: none;
        }
        .attribution a:hover { color: rgba(255,255,255,0.8); }

        /* ---- Demo stage fills entire viewport ---- */
        .teaser-sim-stage {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
        }

        /* Ensure canvas fills stage */
        #teaserCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Keep sim-status visible and centered */
        .sim-status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            color: rgba(255,255,255,0.7);
            font-size: 16px;
            pointer-events: none;
        }
        .sim-status.is-hidden { display: none; }
        .sim-status.is-error { color: #ff8068; }

        /* FPV window */
        .fpv-label {
            position: absolute;
            top: 80px;
            left: 16px;
            z-index: 10;
        }
        .fpv-window {
            position: absolute;
            top: 100px;
            left: 16px;
            z-index: 10;
        }

        /* HUD */
        .sim-hud {
            position: absolute;
            bottom: 80px;
            left: 16px;
            z-index: 10;
        }

        /* Controls panel */
        .sim-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: rgba(20, 23, 21, 0.84);
            border: 1px solid rgba(237, 247, 243, 0.14);
            border-radius: 12px;
            backdrop-filter: blur(12px);
        }

        .agent-switch {
            display: flex;
            gap: 6px;
        }

        .agent-button {
            min-height: 36px;
            padding: 0 12px;
            font-size: 13px;
            color: var(--text);
            border: 1px solid rgba(237, 247, 243, 0.18);
            border-radius: 999px;
            background: rgba(237, 247, 243, 0.06);
            cursor: pointer;
            transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
        }
        .agent-button:hover {
            transform: translateY(-1px);
            border-color: rgba(98, 223, 202, 0.55);
            background: rgba(98, 223, 202, 0.11);
        }
        .agent-button.is-active {
            border-color: var(--accent);
            background: rgba(98, 223, 202, 0.18);
        }

        .scene-select {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .scene-select span {
            font-size: 13px;
            color: var(--muted);
        }
        .scene-select select {
            min-height: 36px;
            padding: 0 10px;
            font-size: 13px;
            color: var(--text);
            border: 1px solid rgba(237, 247, 243, 0.18);
            border-radius: 8px;
            background: rgba(237, 247, 243, 0.06);
            cursor: pointer;
        }

        .agent-roster {
            display: flex;
            gap: 6px;
        }

        .drive-pad {
            display: grid;
            grid-template-columns: repeat(3, 36px);
            grid-template-rows: repeat(2, 36px);
            gap: 4px;
        }
        .drive-pad button {
            width: 36px;
            height: 36px;
            font-size: 14px;
            color: var(--text);
            border: 1px solid rgba(237, 247, 243, 0.18);
            border-radius: 6px;
            background: rgba(237, 247, 243, 0.06);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 180ms ease;
        }
        .drive-pad button:hover {
            background: rgba(98, 223, 202, 0.14);
        }

        .button.compact {
            min-height: 36px;
            padding: 0 14px;
            font-size: 13px;
            color: var(--text);
            border: 1px solid rgba(237, 247, 243, 0.18);
            border-radius: 999px;
            background: rgba(237, 247, 243, 0.06);
            cursor: pointer;
            transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
        }
        .button.compact:hover {
            transform: translateY(-1px);
            border-color: rgba(98, 223, 202, 0.55);
            background: rgba(98, 223, 202, 0.11);
        }

        /* Hide TriSplat page-level elements that might leak via CSS */
        .site-header, .hero, .hero-video-section, .mesh-gradient,
        section:not(.interactive-section), footer, .brand-mark {
            display: none !important;
        }
    </style>

    <!-- Import map: Three.js from TriSplat's exact vendor version -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://lhmd.top/trisplat/assets/vendor/three/build/three.module.js"
        }
    }
    </script>
</head>
<body>

<!-- Site Navigation -->
<nav class="nav">
    <a href="/" class="brand">Z7A的个人空间</a>
    <a href="/">Home</a>
    <a href="/town/">小镇</a>
    <a href="/3dscene/" class="active">3D场景</a>
    <a href="/cv/">CV</a>
</nav>

<!-- ============================================================ -->
<!-- Interactive Demo (TriSplat)                                   -->
<!-- ============================================================ -->
<div class="teaser-sim-stage">
    <canvas id="teaserCanvas" tabindex="0"
        aria-label="Interactive robot playground with live first-person viewport"
        data-runtime-scene="dl3dv-1"
        data-runtime-camera-height-scale="1">
    </canvas>

    <div class="sim-status" id="teaserStatus">Loading scene...</div>

    <div class="fpv-label" aria-hidden="true">Live FPV</div>
    <div class="fpv-window" id="fpvWindow" aria-hidden="true">
        <canvas id="fpvCanvas"></canvas>
    </div>

    <div class="sim-hud" aria-hidden="true">
        <span id="teaserAgentName">Humanoid Robot</span>
        <span id="teaserSpeed">0.0 m/s</span>
    </div>

    <div class="sim-controls" aria-label="Playground controls">
        <div class="agent-switch" role="group" aria-label="Spawn agent">
            <button class="agent-button" type="button" data-agent="humanoid">Add Robot</button>
            <button class="agent-button" type="button" data-agent="quadruped">Add Robot Dog</button>
            <button class="agent-button" type="button" data-agent="rover">Add Rover</button>
        </div>

        <label class="scene-select">
            <span>Scene</span>
            <select id="runtimeSceneSelect" aria-label="Runtime scene">
                <option value="dl3dv-1">DL3DV-98f</option>
                <option value="dl3dv-9">DL3DV-389</option>
                <option value="dl3dv-2">DL3DV-f70</option>
                <option value="dl3dv-8">DL3DV-826</option>
                <option value="dl3dv-5">DL3DV-374</option>
                <option value="dl3dv-7">DL3DV-b7f</option>
                <option value="dl3dv-3">DL3DV-fae</option>
                <option value="dl3dv-10">DL3DV-63f</option>
                <option value="dl3dv-4">DL3DV-779</option>
                <option value="dl3dv-12">DL3DV-cb7</option>
                <option value="dl3dv-6">DL3DV-9c5</option>
                <option value="dl3dv-11">DL3DV-f35</option>
                <option value="re10k-1">RE10K-ff8</option>
                <option value="re10k-2">RE10K-63b</option>
                <option value="re10k-3">RE10K-b56</option>
            </select>
        </label>

        <div class="agent-roster" id="agentRoster" role="group" aria-label="Active agents"></div>

        <button class="button compact" id="dropBeacon" type="button">Mark Position</button>

        <div class="drive-pad" aria-label="Drive pad">
            <button type="button" data-drive="rotate-left" aria-label="Rotate left">↶</button>
            <button type="button" data-drive="forward" aria-label="Forward">▲</button>
            <button type="button" data-drive="rotate-right" aria-label="Rotate right">↷</button>
            <button type="button" data-drive="left" aria-label="Left">◀</button>
            <button type="button" data-drive="backward" aria-label="Backward">▼</button>
            <button type="button" data-drive="right" aria-label="Right">▶</button>
        </div>
    </div>
</div>

<div class="attribution">
    Demo powered by <a href="https://lhmd.top/trisplat/" target="_blank" rel="noopener">TriSplat</a>
</div>

<!-- Load TriSplat interactive demo engine from source -->
<script type="module" src="https://lhmd.top/trisplat/teaser-sim.js?v=36"></script>

</body>
</html>
