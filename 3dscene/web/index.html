<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DGS场景展示 - Z7A的个人空间</title>
    <link rel="icon" type="image/svg+xml" href="https://azureovo.github.io/images/favicon.svg">

    <!-- Base URL: redirect all relative fetch() calls to TriSplat origin -->
    <base href="https://lhmd.top/trisplat/">

    <style>
        /* ============================================================
           Global reset & base
           ============================================================ */
        :root {
            --bg: #0a0b0a;
            --text: #f5efe2;
            --muted: #b9b5a8;
            --accent: #5ce2c7;
            --accent-2: #dcae5a;
            --danger: #ff7a62;
            --panel: rgba(13, 17, 15, 0.88);
            --line: rgba(245, 239, 226, 0.13);
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #080a09;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', ui-sans-serif, sans-serif;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
        }

        /* Kill all TriSplat page-level pseudo-element leaks */
        body::before, body::after,
        .mesh-gradient, .mesh-gradient::before, .mesh-gradient::after,
        section:not(#playground), .hero, .hero-video-section, .site-header,
        footer, .brand-mark, .viewer-heading, .method-grid, .result-gallery,
        .bib-card, .media-caption, .mesh-group, .mesh-rail-shell {
            display: none !important;
            position: absolute !important;
            width: 0 !important;
            height: 0 !important;
            overflow: hidden !important;
            pointer-events: none !important;
        }

        /* ============================================================
           Site Navigation (overlay)
           ============================================================ */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            background: linear-gradient(180deg, rgba(8,10,9,0.94) 0%, transparent 100%);
            pointer-events: none;
        }
        .nav a {
            color: #888;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
            pointer-events: auto;
        }
        .nav a:hover { color: #fff; }
        .nav a.brand {
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            margin-right: auto;
        }
        .nav a.active { color: var(--accent); }
        .nav a.back-hub {
            color: var(--accent);
            font-weight: 600;
        }
        .nav a.back-hub:hover { color: #fff; }

        /* ============================================================
           Demo Stage (full viewport)
           ============================================================ */
        .teaser-sim-stage {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
        }

        #teaserCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ============================================================
           Loading overlay (auto-hides when scene is ready)
           ============================================================ */
        .loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            background: rgba(8, 10, 9, 0.92);
            backdrop-filter: blur(6px);
            transition: opacity 0.5s ease;
        }
        /* Auto-hide when sim-status becomes hidden (scene loaded) */
        .sim-status.is-hidden ~ .loading-overlay {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: #5ce2c7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            color: rgba(255,255,255,0.7);
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.02em;
        }
        .loading-sub {
            color: rgba(255,255,255,0.35);
            font-size: 12px;
            margin-top: -8px;
        }

        /* ============================================================
           Status chip (JS sets .is-hidden / .is-error)
           ============================================================ */
        .sim-status {
            position: absolute;
            top: 80px;
            left: 18px;
            z-index: 10;
            max-width: calc(100% - 72px);
            padding: 9px 14px;
            font-size: 0.86rem;
            font-weight: 750;
            color: #06100f;
            border-radius: 999px;
            background: rgba(92, 226, 199, 0.94);
            pointer-events: none;
            white-space: nowrap;
        }
        .sim-status.is-hidden { display: none; }
        .sim-status.is-error {
            color: #fff;
            background: rgba(255, 122, 98, 0.94);
        }

        /* ============================================================
           FPV label & window
           ============================================================ */
        .fpv-label {
            position: absolute;
            top: 80px;
            right: 14px;
            z-index: 10;
            width: min(48vw, 240px);
            display: flex;
            align-items: center;
            padding: 0 13px;
            height: 34px;
            font-size: 0.76rem;
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #dff4ee;
            border: 1px solid rgba(245, 239, 226, 0.28);
            border-bottom: 0;
            border-radius: 6px 6px 0 0;
            background: rgba(4, 12, 13, 0.72);
            pointer-events: none;
        }

        .fpv-window {
            position: absolute;
            top: 114px;
            right: 14px;
            z-index: 10;
            width: min(48vw, 240px);
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border: 1px solid rgba(92, 226, 199, 0.36);
            border-top: 0;
            border-radius: 0 0 6px 6px;
            background: #071114;
            pointer-events: none;
        }

        #fpvCanvas {
            width: 100%;
            height: 100%;
        }

        /* ============================================================
           HUD (agent name + speed, bottom-left)
           ============================================================ */
        .sim-hud {
            position: absolute;
            bottom: 80px;
            left: 18px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: var(--text);
            pointer-events: none;
            text-shadow: 0 1px 8px rgba(0,0,0,0.6);
        }
        .sim-hud span + span {
            color: var(--muted);
            font-size: 0.82rem;
        }

        /* ============================================================
           Bottom controls bar (flex, centered)
           ============================================================ */
        .sim-controls {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px 16px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 12px;
            backdrop-filter: blur(14px);
            max-width: calc(100vw - 32px);
        }

        /* ---- Agent spawn buttons ---- */
        .agent-switch {
            display: flex;
            gap: 6px;
        }

        .agent-button {
            min-height: 38px;
            padding: 0 14px;
            font-size: 13px;
            font-family: inherit;
            color: var(--text);
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(245, 239, 226, 0.06);
            cursor: pointer;
            transition: transform 0.18s, border-color 0.18s, background 0.18s;
            white-space: nowrap;
        }
        .agent-button:hover {
            transform: translateY(-1px);
            border-color: rgba(92, 226, 199, 0.55);
            background: rgba(92, 226, 199, 0.11);
        }
        .agent-button.is-active {
            border-color: var(--accent);
            background: rgba(92, 226, 199, 0.18);
            color: var(--accent);
        }

        /* ---- Scene selector ---- */
        .scene-select {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .scene-select span {
            font-size: 13px;
            color: var(--muted);
            white-space: nowrap;
        }
        .scene-select select {
            min-height: 38px;
            padding: 0 10px;
            font-size: 13px;
            font-family: inherit;
            color: var(--text);
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(245, 239, 226, 0.06);
            cursor: pointer;
            outline: none;
        }
        .scene-select select:focus {
            border-color: var(--accent);
        }

        /* ---- Agent roster chips (empty by default, JS populates) ---- */
        .agent-roster {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            min-height: 0;
        }
        .agent-roster:empty {
            display: none;
        }

        /* ---- Mark Position button ---- */
        #dropBeacon {
            min-height: 38px;
            padding: 0 16px;
            font-size: 13px;
            font-family: inherit;
            color: var(--text);
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(245, 239, 226, 0.06);
            cursor: pointer;
            transition: transform 0.18s, border-color 0.18s, background 0.18s;
            white-space: nowrap;
        }
        #dropBeacon:hover {
            transform: translateY(-1px);
            border-color: rgba(92, 226, 199, 0.55);
            background: rgba(92, 226, 199, 0.11);
        }

        /* ---- Drive pad (3x2 grid) ---- */
        .drive-pad {
            display: grid;
            grid-template-columns: repeat(3, 38px);
            grid-template-rows: repeat(2, 38px);
            gap: 5px;
        }
        .drive-pad button {
            width: 38px;
            height: 38px;
            font-size: 15px;
            font-family: inherit;
            color: var(--text);
            border: 1px solid var(--line);
            border-radius: 6px;
            background: rgba(245, 239, 226, 0.06);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.18s;
        }
        .drive-pad button:hover {
            background: rgba(92, 226, 199, 0.16);
        }
        .drive-pad button:active {
            background: rgba(92, 226, 199, 0.28);
        }

        /* ---- Roster chips (dynamically created by JS) ---- */
        .roster-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            font-size: 12px;
            color: var(--text);
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(245, 239, 226, 0.06);
            cursor: pointer;
            transition: border-color 0.18s, background 0.18s;
        }
        .roster-chip:hover {
            border-color: var(--accent);
            background: rgba(92, 226, 199, 0.1);
        }
        .roster-chip.is-active {
            border-color: var(--accent);
            background: rgba(92, 226, 199, 0.18);
            color: var(--accent);
        }

        /* ---- Beacons (position markers created by JS) ---- */
        .beacon-marker {
            position: absolute;
            pointer-events: none;
            color: var(--accent-2);
            font-size: 0.85rem;
        }

        /* ============================================================
           Responsive tweaks
           ============================================================ */
        @media (max-width: 900px) {
            .fpv-label, .fpv-window {
                width: calc(100vw - 28px);
            }
            .sim-controls {
                gap: 6px;
                padding: 8px 10px;
            }
            .agent-button {
                min-height: 34px;
                padding: 0 10px;
                font-size: 12px;
            }
            .drive-pad {
                grid-template-columns: repeat(3, 34px);
                grid-template-rows: repeat(2, 34px);
                gap: 4px;
            }
            .drive-pad button {
                width: 34px;
                height: 34px;
                font-size: 14px;
            }
        }

        @media (max-width: 600px) {
            .nav {
                padding: 8px 14px;
                gap: 12px;
            }
            .nav a { font-size: 12px; }
            .nav a.brand { font-size: 14px; }
            .sim-controls {
                padding: 6px 8px;
                gap: 4px;
            }
        }
    </style>

    <!-- Import map: Three.js vendor from TriSplat's bundle -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://lhmd.top/trisplat/assets/vendor/three/build/three.module.js"
        }
    }
    </script>
</head>
<body>

<!-- Site Navigation -->
<nav class="nav">
    <a href="https://azureovo.github.io/" class="brand">Z7A的个人空间</a>
    <a href="https://azureovo.github.io/">Home</a>
    <a href="https://azureovo.github.io/3dscene/">3DGS</a>
    <a href="https://azureovo.github.io/cv/">CV</a>
    <a href="https://azureovo.github.io/3dscene/" class="back-hub">← 返回 Hub</a>
</nav>

<!-- ============================================================ -->
<!-- Interactive Demo (TriSplat)                                   -->
<!-- ============================================================ -->
<div class="teaser-sim-stage">
    <canvas id="teaserCanvas" tabindex="0"
        aria-label="Interactive robot playground with live first-person viewport"
        data-runtime-scene="dl3dv-1"
        data-runtime-camera-height-scale="1">
    </canvas>

    <div class="sim-status" id="teaserStatus">Loading scene...</div>

    <div class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading 3D Scene...</div>
        <div class="loading-sub">Please wait a moment</div>
    </div>

    <div class="fpv-label" aria-hidden="true">Live FPV</div>
    <div class="fpv-window" id="fpvWindow" aria-hidden="true">
        <canvas id="fpvCanvas"></canvas>
    </div>

    <div class="sim-hud" aria-hidden="true">
        <span id="teaserAgentName">Humanoid Robot</span>
        <span id="teaserSpeed">0.0 m/s</span>
    </div>

    <div class="sim-controls" aria-label="Playground controls">
        <div class="agent-switch" role="group" aria-label="Spawn agent">
            <button class="agent-button" type="button" data-agent="humanoid">Add Robot</button>
            <button class="agent-button" type="button" data-agent="quadruped">Add Robot Dog</button>
            <button class="agent-button" type="button" data-agent="rover">Add Rover</button>
        </div>

        <label class="scene-select">
            <span>Scene</span>
            <select id="runtimeSceneSelect" aria-label="Runtime scene">
                <option value="dl3dv-1">DL3DV-98f</option>
                <option value="dl3dv-9">DL3DV-389</option>
                <option value="dl3dv-2">DL3DV-f70</option>
                <option value="dl3dv-8">DL3DV-826</option>
                <option value="dl3dv-5">DL3DV-374</option>
                <option value="dl3dv-7">DL3DV-b7f</option>
                <option value="dl3dv-3">DL3DV-fae</option>
                <option value="dl3dv-10">DL3DV-63f</option>
                <option value="dl3dv-4">DL3DV-779</option>
                <option value="dl3dv-12">DL3DV-cb7</option>
                <option value="dl3dv-6">DL3DV-9c5</option>
                <option value="dl3dv-11">DL3DV-f35</option>
                <option value="re10k-1">RE10K-ff8</option>
                <option value="re10k-2">RE10K-63b</option>
                <option value="re10k-3">RE10K-b56</option>
            </select>
        </label>

        <div class="agent-roster" id="agentRoster" role="group" aria-label="Active agents"></div>

        <button id="dropBeacon" type="button">Mark Position</button>

        <div class="drive-pad" aria-label="Drive pad">
            <button type="button" data-drive="rotate-left" aria-label="Rotate left">↶</button>
            <button type="button" data-drive="forward" aria-label="Forward">▲</button>
            <button type="button" data-drive="rotate-right" aria-label="Rotate right">↷</button>
            <button type="button" data-drive="left" aria-label="Left">◀</button>
            <button type="button" data-drive="backward" aria-label="Backward">▼</button>
            <button type="button" data-drive="right" aria-label="Right">▶</button>
        </div>
    </div>
</div>

<!-- Load TriSplat interactive demo engine -->
<script type="module" src="https://lhmd.top/trisplat/teaser-sim.js?v=36"></script>

</body>
</html>
